<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 0초 만에 자동으로 simulator.html 페이지로 이동시키는 메타 태그 -->
    <meta http-equiv="refresh" content="0; url=simulator.html">
    <title>제조 설비 공수 시뮬레이터 접속</title>
    
    <!-- Tailwind CSS (잠깐의 로딩 화면을 깔끔하게 보여주기 위함) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
    
    <!-- 메타 태그가 작동안할 경우를 대비한 자바스크립트 안전장치 -->
    <script>
        window.onload = function() {
            try {
                // 미리보기 화면 같은 Blob/Data URL 환경에서는 상대 경로 이동 시 에러가 발생할 수 있어 예외 처리 적용
                if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                    window.location.replace("simulator.html");
                }
            } catch (error) {
                console.warn("자동 이동이 지원되지 않는 환경입니다. 화면의 버튼을 클릭해주세요.", error);
            }
        };
    </script>
</head>
<body class="bg-[#f8fafc] h-screen flex flex-col items-center justify-center text-slate-600">
    <!-- 로딩 스피너 애니메이션 -->
    <div class="mb-4">
        <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-500"></i>
    </div>
    <h1 class="text-lg font-bold text-slate-800 tracking-tight">AXBIS 시뮬레이터로 이동 중입니다...</h1>
    <p class="text-sm mt-2">잠시만 기다려주세요.</p>
    
    <!-- 혹시라도 자동 이동이 안 될 경우를 대비한 수동 버튼 -->
    <a href="simulator.html" class="mt-8 px-4 py-2 bg-indigo-50 text-indigo-600 rounded-lg text-sm font-bold border border-indigo-100 hover:bg-indigo-100 transition-colors">
        이동되지 않는다면 여기를 클릭하세요
    </a>
</body>
</html>
